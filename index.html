<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>German Vocab Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="A1 Quiz">
    <meta name="theme-color" content="#0b0d17">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #0b0d17;
            --card-bg: #131627;
            --accent-cyan: #00e5c0;
            --accent-purple: #7c6af7;
            --wrong-red: #ff4f6d;
            --text-main: #ffffff;
            --text-dim: #8a8d9e;
            --btn-bg: #1c2038;
            --btn-hover: #262b48;
            --border: #2a2e45;
            --overlay: rgba(11, 13, 23, 0.92);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 30px 20px 0;
            width: 100%;
            max-width: 760px;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 0.82rem;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }
        .stats {
            font-weight: bold;
            font-size: 0.9rem;
            word-spacing: 15px;
            margin-bottom: 20px;
        }
        .stats .corr { color: var(--accent-cyan); }
        .stats .wrng { color: var(--wrong-red); }

        hr {
            width: 100%;
            max-width: 700px;
            border: none;
            border-top: 1px solid var(--border);
            margin-bottom: 20px;
        }

        /* ===== BOTTOM BAR ===== */
        .bottom-bar {
            display: flex;
            gap: 0;
            width: 100%;
            max-width: 700px;
            margin-bottom: 24px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .bottom-btn {
            flex: 1;
            background: var(--btn-bg);
            border: none;
            color: var(--text-dim);
            padding: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bottom-btn:first-child { border-right: 1px solid var(--border); }
        .bottom-btn:hover { background: var(--btn-hover); color: var(--text-main); }
        .bottom-btn:active { transform: scale(0.97); }

        /* ===== QUIZ CARD ===== */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 0 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: var(--text-dim);
            font-size: 0.82rem;
            letter-spacing: 1px;
        }
        .badge {
            background: transparent;
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            text-transform: uppercase;
        }

        .audio-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            min-height: 140px;
            justify-content: center;
        }
        .speaker-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1a1e36;
            border: 2px solid var(--accent-cyan);
            color: var(--text-main);
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 229, 192, 0.2);
            transition: transform 0.1s;
        }
        .speaker-btn:active { transform: scale(0.93); }

        .speed-toggle {
            display: flex;
            margin-top: 20px;
            border: 1px solid var(--border);
            border-radius: 30px;
            overflow: hidden;
        }
        .speed-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 7px 18px;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .speed-btn.active {
            background: #1a1e36;
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            border-radius: 30px;
        }

        .text-question {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .text-sub {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }
        .opt-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 16px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .opt-btn:hover { background: var(--btn-hover); border-color: #3f4563; }
        .opt-btn.correct { background: var(--accent-cyan) !important; color: #000 !important; border-color: var(--accent-cyan) !important; }
        .opt-btn.wrong { background: var(--wrong-red) !important; color: #fff !important; border-color: var(--wrong-red) !important; }

        .card-footer {
            display: flex;
            gap: 12px;
        }
        .action-btn {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 14px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:hover { border-color: var(--text-dim); color: var(--text-main); }

        #result-area { text-align: center; display: none; }

        /* ===== SETUP SCREEN ===== */
        .setup-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }
        .setup-section {
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        .setup-section h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--accent-cyan);
        }
        .num-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .num-btn {
            background: var(--btn-bg);
            border: 2px solid var(--border);
            color: var(--text-main);
            padding: 14px 8px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .num-btn:hover { border-color: var(--accent-purple); }
        .num-btn.selected { border-color: var(--accent-cyan); background: rgba(0,229,192,0.1); color: var(--accent-cyan); }
        .num-btn .num-label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 4px;
            font-weight: 400;
        }

        .custom-num-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            align-items: center;
        }
        .custom-num-row input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            font-size: 0.95rem;
            outline: none;
        }
        .custom-num-row input:focus { border-color: var(--accent-cyan); }
        .custom-num-row input::placeholder { color: #555; }

        .start-btn {
            width: 100%;
            max-width: 700px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            color: #000;
            padding: 18px;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
            box-shadow: 0 4px 20px rgba(0, 229, 192, 0.2);
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 229, 192, 0.3); }
        .start-btn:active { transform: scale(0.98); }

        /* ===== MODAL (Add Words) ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
            overflow-y: auto;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 560px;
            padding: 28px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 6px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-sub {
            color: var(--text-dim);
            font-size: 0.78rem;
            margin-bottom: 20px;
        }

        .word-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label {
            font-size: 0.72rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input, .form-group select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent-cyan); }
        .form-group select { cursor: pointer; }
        .form-group select option { background: var(--bg); color: var(--text-main); }

        .type-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .type-toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.82rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .type-toggle-btn.active {
            background: var(--accent-purple);
            color: #fff;
        }

        .add-word-btn {
            width: 100%;
            background: var(--accent-purple);
            border: none;
            color: #fff;
            padding: 13px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .add-word-btn:hover { opacity: 0.9; }
        .add-word-btn:active { transform: scale(0.98); }

        .added-list {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }
        .added-list h4 {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .added-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: var(--btn-bg);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.82rem;
        }
        .added-item .word-info {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .added-item .de { color: var(--accent-cyan); font-weight: 700; }
        .added-item .en { color: var(--text-dim); }
        .added-item .tag {
            font-size: 0.65rem;
            color: var(--accent-purple);
            border: 1px solid var(--accent-purple);
            padding: 2px 6px;
            border-radius: 10px;
        }
        .remove-btn {
            background: none;
            border: none;
            color: var(--wrong-red);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            line-height: 1;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-close-btn {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 13px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close-btn:hover { border-color: var(--text-dim); color: var(--text-main); }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-cyan);
            color: #000;
            padding: 12px 24px;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 2000;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .word-count-badge {
            display: inline-block;
            background: var(--accent-purple);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            font-family: 'Space Mono', monospace;
        }

        /* Scroll for added list */
        .added-scroll {
            max-height: 200px;
            overflow-y: auto;
        }
        .added-scroll::-webkit-scrollbar { width: 4px; }
        .added-scroll::-webkit-scrollbar-track { background: transparent; }
        .added-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        @media (max-width: 480px) {
            .num-options { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .card { padding: 20px; margin: 0 12px; }
            .bottom-bar { margin-left: 12px; margin-right: 12px; }
            .header { padding: 20px 12px 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>German Vocab Quiz</h1>
        <div class="subtitle" id="subtitle-info">634 words · 479 vocab + 155 artikel · Listen & Choose</div>
        <div class="stats" id="stats-bar" style="display:none;">
            <span class="corr">● <span id="count-correct">0</span> correct</span>
            <span class="wrng">● <span id="count-wrong">0</span> wrong</span>
        </div>
    </div>

    <hr>

    <!-- ===== SETUP SCREEN ===== -->
    <div id="setup-screen" class="setup-screen">
        <div class="setup-section">
            <h3>Choose Word Number</h3>
            <div class="num-options" id="num-options">
                <button class="num-btn" data-count="10" onclick="selectCount(10, this)">10<span class="num-label">Quick</span></button>
                <button class="num-btn" data-count="25" onclick="selectCount(25, this)">25<span class="num-label">Short</span></button>
                <button class="num-btn" data-count="50" onclick="selectCount(50, this)">50<span class="num-label">Medium</span></button>
                <button class="num-btn selected" data-count="0" onclick="selectCount(0, this)">ALL<span class="num-label">Full set</span></button>
            </div>
            <div class="custom-num-row">
                <input type="number" id="custom-count" min="1" placeholder="Or type a custom number..." oninput="customCountInput(this)">
            </div>
        </div>

        <div class="bottom-bar">
            <button class="bottom-btn" onclick="openAddWords()">Add Words</button>
            <button class="bottom-btn" id="word-pool-info" style="cursor:default; pointer-events:none;">Word Pool: <span id="pool-count">125</span></button>
        </div>

        <button class="start-btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- ===== QUIZ AREA ===== -->
    <div class="card" id="quiz-area" style="display:none;">
        <div class="card-header">
            <span id="q-label">QUESTION 1 / 125 · VOCAB</span>
            <span id="q-badge" class="badge">VERB</span>
        </div>
        <div id="dynamic-content"></div>
        <div class="options-grid" id="options"></div>
        <div class="card-footer" id="footer-actions">
            <button class="action-btn" onclick="showAns()">Show Answer</button>
            <button class="action-btn" onclick="skip()">Skip →</button>
        </div>
    </div>

    <!-- ===== RESULT AREA ===== -->
    <div class="card" id="result-area" style="display:none;">
        <h2 style="color: var(--accent-cyan); font-family: 'Syne', sans-serif; margin-bottom: 20px;">Quiz Complete!</h2>
        <p class="subtitle" id="final-score" style="font-size: 1.2rem; margin: 20px 0;"></p>
        <div style="display:flex; gap:12px;">
            <button class="opt-btn" onclick="backToSetup()" style="flex:1; border-color: var(--accent-purple);">New Quiz</button>
            <button class="opt-btn" onclick="restartSame()" style="flex:1; border-color: var(--accent-cyan);">Retry</button>
        </div>
    </div>

    <!-- ===== ADD WORDS MODAL ===== -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <h2>Add Words</h2>
            <p class="modal-sub">Add your own vocabulary or artikel questions to the quiz.</p>

            <div class="word-form">
                <div class="form-group full">
                    <label>Type</label>
                    <div class="type-toggle">
                        <button class="type-toggle-btn active" onclick="setAddType('vocab', this)">Vocab</button>
                        <button class="type-toggle-btn" onclick="setAddType('artikel', this)">Artikel</button>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>German Word</label>
                        <input type="text" id="add-german" placeholder="e.g. der Hund">
                    </div>
                    <div class="form-group">
                        <label>English Meaning</label>
                        <input type="text" id="add-english" placeholder="e.g. dog">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="add-category">
                            <option value="Noun">Noun</option>
                            <option value="Verb">Verb</option>
                            <option value="Adjective">Adjective</option>
                            <option value="Adverb">Adverb</option>
                            <option value="Preposition">Preposition</option>
                            <option value="Numbers">Numbers</option>
                            <option value="Months">Months</option>
                            <option value="Clothing & Colors">Clothing & Colors</option>
                            <option value="Common Adverbs">Common Adverbs</option>
                            <option value="Interjection">Interjection</option>
                            <option value="Custom">Custom</option>
                        </select>
                    </div>
                    <div class="form-group" id="artikel-select-group" style="display:none;">
                        <label>Artikel (Correct)</label>
                        <select id="add-artikel">
                            <option value="der">der</option>
                            <option value="die">die</option>
                            <option value="das">das</option>
                        </select>
                    </div>
                </div>

                <button class="add-word-btn" onclick="addWord()">+ Add Word</button>
            </div>

            <div class="added-list" id="added-list" style="display:none;">
                <h4>Added Words <span class="word-count-badge" id="added-count">0</span></h4>
                <div class="added-scroll" id="added-scroll"></div>
            </div>

            <div class="modal-actions">
                <button class="modal-close-btn" onclick="closeAddWords()">Done</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

Plan"}, {"type": "vocab", "q": "der Plan", "ans": "plan/map", "options": [], "grp": "Noun"}, {"type": "artikel", "q": "Pommes frites", "ans": "die", "eng": "French fries", "options": ["der", "die", "das"], "grp": "Noun", "full": "die Pommes frites"}, {"type": "vocab", "q": "die Pommes frites", "ans": "French fries", "options": [], "grp": "Noun"}, {"type": "artikel", "q": "Praktikum", "ans": "das", "eng": "internship", "options": ["der", "die", "das"], "grp": "Noun", "full": "das Praktikum"}, {"type": "vocab", "q": "das Praktikum", "ans": "internship", "options": [], "grp": "Noun"}, {"type": "artikel", "q": "Problem", "ans": "das", "eng": "problem", "options": ["der", "die", "das"], "grp": "Noun", "full": "das Problem"}, {"type": "vocab", "q": "das Problem", "ans": "problem", "options": [], "grp": "Noun"}, {"type": "artikel", "q": "Prospekt", "ans": "der", "eng": "brochure", "options": ["der", "die", "das"], "grp": "Noun", "full": "der Prospekt"}, {"type": "vocab", "q": "der Prospekt", "ans": "brochure", "options": [], "grp": "Noun"}, {"type": "artikel", "q": "Reparatur", "ans": "die", "eng": "repair", "options": ["der", "die", "das"], "grp": "Noun", "full": "die Reparatur"}, {"type": "vocab", "q": "die Reparatur", "ans": "repair", "options": [], "grp": "Noun"}, {"type": "artikel", "q": "Saft", "ans": "der", "eng": "juice", "options": ["der", "die", "das"], "grp": "Noun", "full": "der Saft"}, {"type": "vocab", "q": "der Saft", "ans": "juice", "options": [], "grp": "Noun"}];

        // ===== STATE =====
        let userWords = JSON.parse(localStorage.getItem('germanQuizUserWords') || '[]');
        let selectedCount = 0; // 0 = ALL
        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let wrongCount = 0;
        let locked = false;
        let isSlow = false;
        let addType = 'vocab';
        const synth = window.speechSynthesis;

        // ===== INIT =====
        updatePoolCount();
        renderAddedList();

        function getAllWords() {
            return [...baseQuestions, ...userWords];
        }

        function updatePoolCount() {
            document.getElementById('pool-count').textContent = getAllWords().length;
            const vocabCount = getAllWords().filter(w => w.type === 'vocab').length;
            const artikelCount = getAllWords().filter(w => w.type === 'artikel').length;
            document.getElementById('subtitle-info').textContent =
                `${getAllWords().length} words · ${vocabCount} vocab + ${artikelCount} artikel · Listen & Choose`;
        }

        // ===== CHOOSE COUNT =====
        function selectCount(count, btn) {
            document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedCount = count;
            document.getElementById('custom-count').value = '';
        }

        function customCountInput(input) {
            const v = parseInt(input.value);
            if (v > 0) {
                document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
                selectedCount = v;
            }
        }

        // ===== GENERATE OPTIONS =====
        function generateOptions(correctAns, type, allWords) {
            const sameType = allWords.filter(w => w.type === type);
            const pool = sameType.map(w => w.ans).filter(a => a !== correctAns);
            const unique = [...new Set(pool)];
            shuffleArray(unique);
            const wrongOpts = unique.slice(0, type === 'artikel' ? 2 : 3);
            const opts = [...wrongOpts, correctAns];
            shuffleArray(opts);
            return opts;
        }

        // ===== START QUIZ =====
        function startQuiz() {
            const all = getAllWords();
            shuffleArray(all);

            let count = selectedCount === 0 ? all.length : Math.min(selectedCount, all.length);
            questions = all.slice(0, count);

            // Regenerate options so new words integrate properly
            questions.forEach(q => {
                q.options = generateOptions(q.ans, q.type, getAllWords());
            });

            currentIdx = 0;
            score = 0;
            wrongCount = 0;
            locked = false;

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('stats-bar').style.display = 'block';
            document.getElementById('count-correct').textContent = '0';
            document.getElementById('count-wrong').textContent = '0';

            renderQuestion();
        }

        // ===== RENDER QUESTION =====
        function renderQuestion() {
            if (currentIdx >= questions.length) return endQuiz();
            locked = false;
            const q = questions[currentIdx];
            const isArt = q.type === 'artikel';
            const total = questions.length;

            document.getElementById('q-label').textContent = `QUESTION ${currentIdx + 1} / ${total} · ${isArt ? 'ARTIKEL' : 'VOCAB'}`;
            document.getElementById('q-badge').textContent = q.grp;
            document.getElementById('q-badge').style.borderColor = isArt ? '#ff9f43' : 'var(--accent-purple)';
            document.getElementById('q-badge').style.color = isArt ? '#ff9f43' : 'var(--accent-purple)';

            const dynContent = document.getElementById('dynamic-content');
            if (isArt) {
                dynContent.innerHTML = `
                    <div class="audio-section" style="min-height: auto;">
                        <div class="text-question" id="art-text">___ ${q.q}</div>
                        <div class="text-sub">${q.eng}</div>
                    </div>`;
            } else {
                dynContent.innerHTML = `
                    <div class="audio-section">
                        <button class="speaker-btn" onclick="speakCurrent()">🔊</button>
                        <div class="speed-toggle" id="speed-toggle">
                            <button id="btn-slow" class="speed-btn ${isSlow ? 'active':''}" onclick="toggleSpeed(true)">Slow</button>
                            <button id="btn-norm" class="speed-btn ${!isSlow ? 'active':''}" onclick="toggleSpeed(false)">Normal</button>
                        </div>
                        <div id="vocab-reveal" class="text-question" style="display:none; margin-top:20px; color: var(--accent-cyan);"></div>
                    </div>`;
                setTimeout(speakCurrent, 300);
            }

            const optsDiv = document.getElementById('options');
            optsDiv.innerHTML = '';
            optsDiv.style.gridTemplateColumns = isArt ? '1fr 1fr 1fr' : '1fr 1fr';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAns(btn, opt, q.ans, isArt);
                optsDiv.appendChild(btn);
            });

            document.getElementById('footer-actions').innerHTML = `
                <button class="action-btn" onclick="showAns()">Show Answer</button>
                <button class="action-btn" onclick="skip()">Skip →</button>
            `;
        }

        // ===== SPEECH =====
        function toggleSpeed(slow) {
            isSlow = slow;
            document.getElementById('btn-slow').classList.toggle('active', slow);
            document.getElementById('btn-norm').classList.toggle('active', !slow);
            speakCurrent();
        }

        function speakCurrent() {
            const q = questions[currentIdx];
            if (q.type !== 'vocab') return;
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(q.q);
            utter.lang = 'de-DE';
            utter.rate = isSlow ? 0.5 : 1.0;
            synth.speak(utter);
        }

        function revealWord() {
            const q = questions[currentIdx];
            if (q.type === 'artikel') {
                document.getElementById('art-text').textContent = q.full;
            } else {
                const reveal = document.getElementById('vocab-reveal');
                reveal.textContent = q.q;
                reveal.style.display = 'block';
                const st = document.getElementById('speed-toggle');
                if (st) st.style.display = 'none';
            }
        }

        // ===== ANSWER LOGIC =====
        function checkAns(btn, selected, correct, isArt) {
            if (locked) return;
            locked = true;
            const buttons = document.querySelectorAll('.opt-btn');

            if (selected === correct) {
                btn.classList.add('correct');
                score++;
                document.getElementById('count-correct').textContent = score;
                revealWord();
                setTimeout(() => { currentIdx++; renderQuestion(); }, 1000);
            } else {
                btn.classList.add('wrong');
                wrongCount++;
                document.getElementById('count-wrong').textContent = wrongCount;
                buttons.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
                revealWord();
                document.getElementById('footer-actions').innerHTML = `
                    <button class="action-btn" style="width:100%; border-color:var(--accent-cyan); color:var(--accent-cyan);" onclick="nextQ()">Next Question →</button>
                `;
            }
        }

        function nextQ() { currentIdx++; renderQuestion(); }
        function skip() { wrongCount++; document.getElementById('count-wrong').textContent = wrongCount; nextQ(); }

        function showAns() {
            if (locked) return;
            locked = true;
            const q = questions[currentIdx];
            document.querySelectorAll('.opt-btn').forEach(b => {
                if (b.textContent === q.ans) b.classList.add('correct');
            });
            revealWord();
            setTimeout(() => { currentIdx++; renderQuestion(); }, 2000);
        }

        function endQuiz() {
            const total = questions.length;
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('final-score').textContent = `Score: ${score} / ${total} (${Math.round(score/total*100)}%)`;
        }

        function backToSetup() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'flex';
            document.getElementById('stats-bar').style.display = 'none';
            updatePoolCount();
        }

        function restartSame() {
            currentIdx = 0;
            score = 0;
            wrongCount = 0;
            shuffleArray(questions);
            questions.forEach(q => {
                q.options = generateOptions(q.ans, q.type, getAllWords());
            });
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('count-correct').textContent = '0';
            document.getElementById('count-wrong').textContent = '0';
            renderQuestion();
        }

        // ===== ADD WORDS MODAL =====
        function openAddWords() {
            document.getElementById('add-modal').classList.add('open');
        }

        function closeAddWords() {
            document.getElementById('add-modal').classList.remove('open');
            updatePoolCount();
        }

        function setAddType(type, btn) {
            addType = type;
            document.querySelectorAll('.type-toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('artikel-select-group').style.display = type === 'artikel' ? 'flex' : 'none';
        }

        function addWord() {
            const german = document.getElementById('add-german').value.trim();
            const english = document.getElementById('add-english').value.trim();
            const category = document.getElementById('add-category').value;

            if (!german || !english) {
                showToast('Please fill in both German and English fields');
                return;
            }

            let newWord;
            if (addType === 'vocab') {
                newWord = {
                    type: 'vocab',
                    q: german,
                    ans: english,
                    options: [], // will be generated at quiz start
                    grp: category
                };
            } else {
                const artikel = document.getElementById('add-artikel').value;
                // Strip artikel from german word if user included it
                let cleanWord = german.replace(/^(der|die|das)\s+/i, '');
                newWord = {
                    type: 'artikel',
                    q: cleanWord,
                    ans: artikel,
                    eng: english,
                    options: ['der', 'die', 'das'],
                    grp: category,
                    full: `${artikel} ${cleanWord}`
                };
            }

            userWords.push(newWord);
            localStorage.setItem('germanQuizUserWords', JSON.stringify(userWords));

            // Clear form
            document.getElementById('add-german').value = '';
            document.getElementById('add-english').value = '';

            renderAddedList();
            updatePoolCount();
            showToast(`Added: ${german}`);
        }

        function removeWord(index) {
            userWords.splice(index, 1);
            localStorage.setItem('germanQuizUserWords', JSON.stringify(userWords));
            renderAddedList();
            updatePoolCount();
        }

        function renderAddedList() {
            const container = document.getElementById('added-list');
            const scroll = document.getElementById('added-scroll');
            const countEl = document.getElementById('added-count');

            if (userWords.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            countEl.textContent = userWords.length;

            scroll.innerHTML = userWords.map((w, i) => `
                <div class="added-item">
                    <div class="word-info">
                        <span class="de">${w.q}</span>
                        <span class="en">→ ${w.ans}${w.eng ? ' (' + w.eng + ')' : ''}</span>
                        <span class="tag">${w.type}</span>
                    </div>
                    <button class="remove-btn" onclick="removeWord(${i})" title="Remove">×</button>
                </div>
            `).reverse().join('');
        }

        // ===== UTILS =====
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // Keyboard shortcut: Enter to start
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.getElementById('setup-screen').style.display !== 'none') {
                startQuiz();
            }
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
